<!--
  Evorios sign-in email — paste into Supabase:
  Authentication → Email Templates → Magic Link

  Subject (separate field):
  Your Evorios code: {{ .Token }}

  Variables: {{ .Token }} = sign-in OTP (6 or 8 digits). Do not include {{ .ConfirmationURL }}.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Evorios sign-in code</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f0f4f2; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f0f4f2; padding: 32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 420px; background: #ffffff; border-radius: 20px; overflow: hidden; border: 1px solid #e8e6e0;">
            <!-- Header -->
            <tr>
              <td style="background: linear-gradient(135deg, #0d5c3a 0%, #1a9e6e 100%); padding: 28px 24px; text-align: center;">
                <p style="margin: 0 0 6px; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.85);">
                  Evorios
                </p>
                <p style="margin: 0; font-size: 22px; font-weight: 800; color: #ffffff; line-height: 1.25;">
                  Mr. Evorios here 👋
                </p>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding: 28px 24px 12px;">
                <p style="margin: 0 0 12px; font-size: 16px; line-height: 1.55; color: #374151;">
                  Here’s your sign-in code. Open <strong>Evorios</strong> and type the numbers below — you don’t need to tap any link.
                </p>
              </td>
            </tr>

            <!-- OTP -->
            <tr>
              <td style="padding: 8px 24px 24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td align="center" style="background: #f0fdf4; border: 2px solid #0d5c3a; border-radius: 16px; padding: 22px 16px;">
                      <p style="margin: 0 0 8px; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #0d5c3a;">
                        Your code
                      </p>
                      <p style="margin: 0; font-size: 36px; font-weight: 800; letter-spacing: 0.28em; color: #0d5c3a; font-variant-numeric: tabular-nums;">
                        {{ .Token }}
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Hint -->
            <tr>
              <td style="padding: 0 24px 24px;">
                <p style="margin: 0; font-size: 14px; line-height: 1.5; color: #6b7280;">
                  This code expires soon. If you didn’t request it, you can ignore this email.
                </p>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding: 16px 24px 24px; border-top: 1px solid #f3f4f6;">
                <p style="margin: 0; font-size: 12px; line-height: 1.5; color: #9ca3af; text-align: center;">
                  Mr. Evorios · Evorios<br />
                  <a href="https://app.evorios.com" style="color: #0d5c3a; text-decoration: none;">app.evorios.com</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
